<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zFinança | Cadastro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-layer">
        <div class="bg-gradient"></div>
        <canvas id="particleCanvas"></canvas>
        <div class="bg-orb bg-orb--1"></div>
        <div class="bg-orb bg-orb--2"></div>
        <div class="bg-orb bg-orb--3"></div>
    </div>

    <main class="dashboard-container" id="dashboardContainer">
        <div class="container-inner">
            
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-logo">
                    <img src="logo1.webp" alt="" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' fill=\'none\' viewBox=\'0 0 24 24\' stroke=\'%2306d6f0\'><path stroke-linecap=\'round\' stroke-linejoin=\'round\' stroke-width=\'2\' d=\'M13 10V3L4 14h7v7l9-11h-7z\'/></svg>'">
                    <span>Performance</span>
                </div>
                
                <nav class="sidebar-nav">
                    <a href="index.html" class="nav-link">
                        <div class="icon-wrap"><i data-lucide="layout-dashboard"></i></div>
                        <span>Dashboard</span>
                    </a>
                    <a href="Cadastro.html" class="nav-link active">
                        <div class="icon-wrap"><i data-lucide="plus-circle"></i></div>
                        <span>Cadastro</span>
                    </a>
                    <a href="Dados.html" class="nav-link">
                        <div class="icon-wrap"><i data-lucide="database"></i></div>
                        <span>Dados</span>
                    </a>
                </nav>

                <div class="sidebar-glow"></div>
            </aside>

            <div class="main-content">
                
                <!-- Transparent Header -->
                <header class="header">
                    <div class="header-title">
                        Dashboard <span style="opacity:0.5; font-weight:400;">| Cadastrar Transação</span>
                    </div>

                    <div class="header-profile">
                        <span class="profile-name">Maria Clara</span>
                        <div class="profile-img">
                            <img src="https://i.pravatar.cc/150?img=47" alt="Avatar Maria Clara">
                        </div>
                    </div>
                </header>

                <!-- Page content -->
                <div class="page-content" id="scrollContent">
                    <div class="form-container">
                        <div class="form-header">
                            <h2>Nova Transação</h2>
                            <p style="color:var(--text-secondary);font-size:0.9rem;margin-top:4px;">Insira os dados da sua nova entrada financeira ou despesa.</p>
                        </div>

                        <form id="transactionForm" onsubmit="handleFormSubmit(event)">
                            
                            <div class="type-toggle">
                                <button type="button" class="type-btn receita active" id="btnReceita" onclick="setType('receita')">
                                    <i data-lucide="arrow-up-circle"></i> Receita
                                </button>
                                <button type="button" class="type-btn despesa" id="btnDespesa" onclick="setType('despesa')">
                                    <i data-lucide="arrow-down-circle"></i> Despesa
                                </button>
                            </div>
                            <!-- Hidden input store selected type -->
                            <input type="hidden" id="transType" value="receita">

                            <div class="form-grid">
                                <div class="form-group">
                                    <label for="transDate">Data</label>
                                    <input type="date" id="transDate" class="form-input" required>
                                </div>
                                <div class="form-group">
                                    <label for="transValue">Valor (R$)</label>
                                    <input type="number" id="transValue" class="form-input" placeholder="0,00" step="0.01" min="0" required>
                                </div>

                                <div class="form-group">
                                    <label for="transCategory">Categoria</label>
                                    <select id="transCategory" class="form-input" required>
                                        <!-- Dynamically generated options via JS based on type -->
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="transSubCategory">Sub Categoria (Opcional)</label>
                                    <input type="text" id="transSubCategory" class="form-input" placeholder="Dica: Ifood, Netflix, Cabelo...">
                                </div>

                                <div class="form-group full-width">
                                    <label for="transDesc">Descrição</label>
                                    <input type="text" id="transDesc" class="form-input" placeholder="Descreva brevemente a transação...">
                                </div>

                                <button type="submit" class="btn-submit">
                                    <i data-lucide="check-circle" style="vertical-align:middle; width:20px; margin-right:8px;"></i> Salvar Transação
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();
        document.getElementById('transDate').valueAsDate = new Date(); // default hoje
    </script>
</body>
</html>
